# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

  # this job handles the verification step        
  run-verification:
    #specifies virtual env
    runs-on: ubuntu-latest
    # job will only run if build completes successfully
    needs: build
    steps:
        # checks out the code so we can access the files
      - uses: actions/checkout@v4
        # sets up python so we can run the verification script
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      # runs the verification script with the appropriate file paths
      # LOG 5: verification summary
      - name: Run Verification
        run: |
          if python scripts/verification.py -r "real outputs/requirements.json" -t "real outputs/test_cases.json"; then
            echo "### Verification Forensics: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Verification Forensics: FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      
      - name: Upload Verification Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-forensics
          path: scripts/PROJECT.LOGGER.log


  # this job handles the validation step
  run-validation:
    # specifies virtual env
    runs-on: ubuntu-latest
    # job will only run if build completes successfully
    needs: build
    steps:
        # checks out the code so we can access the files
      - uses: actions/checkout@v4
        # sets up python so we can run the validation script
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
        # runs the validation script with the appropriate file paths
        # LOG 6: validation summary
      - name: Run Validation
        run: |
          if python scripts/validation.py -r "real outputs/requirements.json" -e "real outputs/expected_structure.json"; then
            echo "### Validation Forensics: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Validation Forensics: FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      
      - name: Upload Validation Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-forensics
          path: scripts/PROJECT-LOGGER.log